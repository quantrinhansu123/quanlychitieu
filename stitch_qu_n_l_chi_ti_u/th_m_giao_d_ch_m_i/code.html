        }

        }
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

<body class="font-body-md text-on-surface antialiased">
<!-- TopAppBar -->
<header class="bg-surface/80 dark:bg-surface-dim/80 backdrop-blur-md fixed top-0 left-0 w-full z-50 flex justify-between items-center px-container-padding py-md">
<div class="flex items-center gap-md">
<div class="w-10 h-10 rounded-full overflow-hidden border-2 border-primary/20">
<img class="w-full h-full object-cover" data-alt="A professional headshot of a smiling young Vietnamese male professional. The portrait is taken in a brightly lit, modern minimalist office setting with soft natural sunlight streaming in, reflecting a warm and trustworthy atmosphere that aligns with a premium personal finance application style." src="https://lh3.googleusercontent.com/aida-public/AB6AXuCfm6rbGlPmt_nC-_hA1FQAGGYjdN0XAL8XEnbtDt54Qw3LjHEHVi7tjReXVeAkvlJwxhO5t8YmgtkrLG27XJtgzvv6-JDvavNusWkXTkt_SDKcsSkezTVc2q55_8aGXeJFD9fKXBFHiRF6fqHtcxyYw-v9yjJXkCMiU1pKV3uoakWbfJpWFfFNjBHkl2caqfLltUNa7z9B53jH6Gur2vS1bG_l7MGgLU2tZkepGGKHWQFrPf6WGY6SLTPSez3ayLZ0efystQPO5oI"/>
</div>
<h1 class="font-h1 text-h1 font-bold text-primary dark:text-primary-fixed-dim">Thêm giao dịch</h1>
</div>
<button class="text-primary transition-all duration-200 active:scale-95 hover:opacity-80">
<span class="material-symbols-outlined" data-icon="notifications">notifications</span>
</button>
</header>
<main class="pt-[88px] pb-32 px-container-padding max-w-md mx-auto">
<!-- Input Số tiền -->
<div class="mb-lg">
<p class="text-label-sm font-label-sm text-on-surface-variant mb-xs ml-base">SỐ TIỀN</p>
<div class="relative bg-surface-container-lowest rounded-xl p-md shadow-[0_8px_24px_rgba(22,29,23,0.03)] border border-outline-variant/30 flex items-center gap-sm">
<span class="font-display text-display text-primary">₫</span>
<input autofocus="" class="w-full bg-transparent border-none focus:ring-0 font-display text-display text-on-surface p-0 placeholder-outline-variant/50" placeholder="0" type="text"/>
</div>
</div>
<!-- Lưới Danh mục -->
<section class="mb-lg">
<div class="flex justify-between items-end mb-md">
<h2 class="font-h2 text-h2 text-on-surface">Danh mục</h2>
<button class="text-primary font-label-md text-label-md">Xem thêm</button>
</div>
<div class="grid grid-cols-4 gap-md">
<!-- Category Item: Ăn uống -->
<button class="flex flex-col items-center gap-xs group">
<div class="w-14 h-14 rounded-full bg-primary-container/10 flex items-center justify-center text-primary-container transition-all duration-200 group-active:scale-90 shadow-sm">
<span class="material-symbols-outlined text-[28px]" data-icon="restaurant" style="font-variation-settings: 'FILL' 1;">restaurant</span>
</div>
<span class="text-label-sm font-label-sm text-on-surface-variant">Ăn uống</span>
</button>
<!-- Category Item: Cafe -->
<button class="flex flex-col items-center gap-xs group">
<div class="w-14 h-14 rounded-full bg-tertiary-container/10 flex items-center justify-center text-tertiary transition-all duration-200 group-active:scale-90 shadow-sm">
<span class="material-symbols-outlined text-[28px]" data-icon="coffee" style="font-variation-settings: 'FILL' 1;">coffee</span>
</div>
<span class="text-label-sm font-label-sm text-on-surface-variant">Cafe</span>
</button>
<!-- Category Item: Nhà cửa -->
<button class="flex flex-col items-center gap-xs group">
<div class="w-14 h-14 rounded-full bg-secondary-container/10 flex items-center justify-center text-secondary transition-all duration-200 group-active:scale-90 shadow-sm">
<span class="material-symbols-outlined text-[28px]" data-icon="home" style="font-variation-settings: 'FILL' 1;">home</span>
</div>
<span class="text-label-sm font-label-sm text-on-surface-variant">Nhà cửa</span>
</button>
<!-- Category Item: Sức khỏe -->
<button class="flex flex-col items-center gap-xs group">
<div class="w-14 h-14 rounded-full bg-error-container/10 flex items-center justify-center text-error transition-all duration-200 group-active:scale-90 shadow-sm">
<span class="material-symbols-outlined text-[28px]" data-icon="health_and_safety" style="font-variation-settings: 'FILL' 1;">health_and_safety</span>
</div>
<span class="text-label-sm font-label-sm text-on-surface-variant">Sức khỏe</span>
</button>
<!-- Category Item: Di chuyển -->
<button class="flex flex-col items-center gap-xs group">
<div class="w-14 h-14 rounded-full bg-surface-container-highest/20 flex items-center justify-center text-on-surface-variant transition-all duration-200 group-active:scale-90 shadow-sm">
<span class="material-symbols-outlined text-[28px]" data-icon="directions_car" style="font-variation-settings: 'FILL' 1;">directions_car</span>
</div>
<span class="text-label-sm font-label-sm text-on-surface-variant">Di chuyển</span>
</button>
<!-- Category Item: Mua sắm -->
<button class="flex flex-col items-center gap-xs group">
<div class="w-14 h-14 rounded-full bg-surface-container-highest/20 flex items-center justify-center text-on-surface-variant transition-all duration-200 group-active:scale-90 shadow-sm">
<span class="material-symbols-outlined text-[28px]" data-icon="shopping_bag" style="font-variation-settings: 'FILL' 1;">shopping_bag</span>
</div>
<span class="text-label-sm font-label-sm text-on-surface-variant">Mua sắm</span>
</button>
<!-- Category Item: Giải trí -->
<button class="flex flex-col items-center gap-xs group">
<div class="w-14 h-14 rounded-full bg-surface-container-highest/20 flex items-center justify-center text-on-surface-variant transition-all duration-200 group-active:scale-90 shadow-sm">
<span class="material-symbols-outlined text-[28px]" data-icon="movie" style="font-variation-settings: 'FILL' 1;">movie</span>
</div>
<span class="text-label-sm font-label-sm text-on-surface-variant">Giải trí</span>
</button>
<!-- Category Item: Hóa đơn -->
<button class="flex flex-col items-center gap-xs group">
<div class="w-14 h-14 rounded-full bg-surface-container-highest/20 flex items-center justify-center text-on-surface-variant transition-all duration-200 group-active:scale-90 shadow-sm">
<span class="material-symbols-outlined text-[28px]" data-icon="receipt" style="font-variation-settings: 'FILL' 1;">receipt</span>
</div>
<span class="text-label-sm font-label-sm text-on-surface-variant">Hóa đơn</span>
</button>
</div>
</section>
<!-- Chi tiết bổ sung -->
<div class="space-y-md">
<!-- Chọn Ngày -->
<div class="bg-surface-container-lowest rounded-xl p-md flex items-center justify-between border border-outline-variant/20 hover:border-primary/50 transition-colors">
<div class="flex items-center gap-md">
<div class="w-10 h-10 rounded-lg bg-surface-container flex items-center justify-center text-on-surface-variant">
<span class="material-symbols-outlined" data-icon="calendar_today">calendar_today</span>
</div>
<div>
<p class="text-label-sm font-label-sm text-on-surface-variant">NGÀY</p>
<p class="text-body-md font-body-md font-semibold">Hôm nay, 24 Tháng 5</p>
</div>
</div>
<span class="material-symbols-outlined text-outline-variant" data-icon="chevron_right">chevron_right</span>
</div>
<!-- Ghi chú -->
<div class="bg-surface-container-lowest rounded-xl p-md flex items-start gap-md border border-outline-variant/20 focus-within:border-primary/50 transition-colors">
<div class="w-10 h-10 rounded-lg bg-surface-container flex items-center justify-center text-on-surface-variant shrink-0">
<span class="material-symbols-outlined" data-icon="notes">notes</span>
</div>
<div class="w-full">
<p class="text-label-sm font-label-sm text-on-surface-variant mb-xs">GHI CHÚ</p>
<textarea class="w-full bg-transparent border-none focus:ring-0 p-0 text-body-md placeholder-outline-variant/50 resize-none" placeholder="Thêm mô tả giao dịch..." rows="2"></textarea>
</div>
</div>
</div>
<!-- Nút Lưu -->
<div class="mt-xl">
<button class="w-full h-14 bg-primary text-on-primary font-body-md font-semibold rounded-xl flex items-center justify-center gap-sm shadow-[0_12px_32px_rgba(0,109,55,0.15)] active:scale-95 transition-all">
<span class="material-symbols-outlined" data-icon="check">check</span>
                Lưu giao dịch
            </button>

<button class="flex flex-col items-center justify-center text-on-surface-variant dark:text-outline-variant px-4 py-1 transition-transform duration-200 active:scale-90 hover:text-primary">

<button class="flex flex-col items-center justify-center text-on-surface-variant dark:text-outline-variant px-4 py-1 transition-transform duration-200 active:scale-90 hover:text-primary">

<button class="flex flex-col items-center justify-center bg-primary-container dark:bg-on-primary-fixed-variant text-on-primary-container dark:text-primary-fixed rounded-full px-4 py-1 transition-transform duration-200 active:scale-90 shadow-lg">
<span class="material-symbols-outlined text-[32px]" data-icon="add_circle" style="font-variation-settings: 'FILL' 1;">add_circle</span>
<span class="font-label-sm text-label-sm font-bold">Thêm</span>
</button>
<button class="flex flex-col items-center justify-center text-on-surface-variant dark:text-outline-variant px-4 py-1 transition-transform duration-200 active:scale-90 hover:text-primary">
<span class="material-symbols-outlined" data-icon="pie_chart">pie_chart</span>
<span class="font-label-sm text-label-sm">Báo cáo</span>
</button>
<button class="flex flex-col items-center justify-center text-on-surface-variant dark:text-outline-variant px-4 py-1 transition-transform duration-200 active:scale-90 hover:text-primary">
<span class="material-symbols-outlined" data-icon="account_balance_wallet">account_balance_wallet</span>
<span class="font-label-sm text-label-sm">Ngân sách</span>
</button>
</nav>
